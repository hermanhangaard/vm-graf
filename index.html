<style>
:root {
  --surface: rgba(43, 6, 18, 0.93);
  --surface-solid: #330716;
  --chalk: #fdf4f5;
  --muted: #d8a8b2;
  --line: rgba(255, 235, 238, 0.16);
  --grid: rgba(255, 235, 238, 0.09);
  --blaa: #4f74e3;
  --blaa-lys: #9db4ff;
  --gold: #f6c453;
  --display: "Barlow Condensed", "Arial Narrow", sans-serif;
  --body: "Barlow", system-ui, sans-serif;
  --digits: "Spline Sans Mono", ui-monospace, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; }
body {
  min-height: 100vh;
  background:
    radial-gradient(120% 80% at 50% -10%, #c2102f 0%, #9d0a26 42%, #6f0a20 100%) fixed;
  color: var(--chalk);
  font-family: var(--body);
  -webkit-font-smoothing: antialiased;
  padding: clamp(0.8rem, 2.4vw, 2.2rem);
}
.flaggkors {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.5;
}
.flaggkors svg { width: 100%; height: 100%; }
.wrap { position: relative; z-index: 1; max-width: 1500px; margin: 0 auto; }

header { margin-bottom: clamp(0.7rem, 1.6vw, 1.3rem); }
.eyebrow {
  font-family: var(--display); font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--blaa-lys); font-size: clamp(0.8rem, 1.4vw, 1rem);
  display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
}
.status {
  display: inline-flex; align-items: center; gap: 0.4rem;
  padding: 0.12rem 0.6rem; border-radius: 999px;
  background: rgba(0,0,0,0.28); border: 1px solid var(--line);
  letter-spacing: 0.04em;
}
.status .dot {
  width: 0.5rem; height: 0.5rem; border-radius: 50%;
  background: var(--gold); box-shadow: 0 0 8px var(--gold);
}
h1 {
  font-family: var(--display); font-weight: 800;
  font-size: clamp(2.1rem, 6vw, 4rem); line-height: 0.95;
  margin: 0.2rem 0 0.25rem; text-transform: uppercase; letter-spacing: 0.01em;
}
.sub { color: var(--muted); margin: 0; font-size: clamp(0.9rem, 1.5vw, 1.1rem); }
.sub b { color: var(--chalk); font-weight: 600; }

.chart-card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: clamp(0.6rem, 1.4vw, 1.1rem);
  box-shadow: 0 24px 60px rgba(0,0,0,0.4);
  backdrop-filter: blur(2px);
}
.chart-wrap { width: 100%; }
#chart { width: 100%; display: block; touch-action: none; }

/* SVG-elementer */
.grid-line { stroke: var(--grid); stroke-width: 1; }
.axis-line { stroke: var(--line); stroke-width: 1.5; }
.tick-label { fill: var(--muted); font-family: var(--digits); font-weight: 500; }
.axis-title { fill: var(--blaa-lys); font-family: var(--display);
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
.serie { fill: none; stroke-width: 2.4; stroke-linejoin: round; stroke-linecap: round;
  opacity: 0.62; transition: opacity 0.12s, stroke-width 0.12s; }
.serie.dim { opacity: 0.08; }
.serie.hot { opacity: 1; stroke-width: 4; }
.dot { transition: opacity 0.12s; }
.dot.dim { opacity: 0.08; }
.endmark { cursor: pointer; }
.endmark.dim { opacity: 0.12; transition: opacity 0.12s; }
.endmark .initial { fill: #1a0309; font-family: var(--display); font-weight: 800;
  text-anchor: middle; dominant-baseline: central; }

/* Tooltip */
.tooltip {
  position: fixed; z-index: 5; pointer-events: none; opacity: 0;
  transform: translate(-50%, -120%); transition: opacity 0.1s;
  background: var(--surface-solid); border: 1px solid var(--line);
  border-radius: 10px; padding: 0.45rem 0.7rem;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5); white-space: nowrap;
}
.tooltip .tt-name { font-family: var(--display); font-weight: 600; font-size: 1.05rem; }
.tooltip .tt-meta { font-family: var(--digits); color: var(--muted); font-size: 0.85rem; }
.tooltip .tt-meta b { color: var(--gold); }

/* Legend */
.legend {
  margin-top: clamp(0.7rem, 1.6vw, 1.2rem);
  display: grid; gap: 0.35rem;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
}
.leg {
  display: flex; align-items: center; gap: 0.55rem; cursor: pointer;
  padding: 0.3rem 0.5rem; border-radius: 9px; border: 1px solid transparent;
  background: rgba(0,0,0,0.16); transition: background 0.12s, opacity 0.12s;
  user-select: none;
}
.leg:hover { background: rgba(0,0,0,0.34); border-color: var(--line); }
.leg.off { opacity: 0.4; }
.leg .rank { font-family: var(--digits); color: var(--muted);
  font-size: 0.85rem; width: 1.6rem; text-align: right; }
.leg .sw { width: 0.9rem; height: 0.9rem; border-radius: 3px; flex: 0 0 auto; }
.leg .lname { font-family: var(--body); font-weight: 600; flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.leg .lpts { font-family: var(--digits); font-weight: 700; color: var(--gold); }
.leg.off .lpts { color: var(--muted); }

.foot { margin-top: 1rem; color: var(--muted); font-size: 0.82rem; text-align: center; }
</style>
</head>

": "Ole-Martin", "poeng": [0, 3, 6, 9, 20, 20], "total": 20, "bilde": null, "initial": "OM", "farge": "#e38e63"}, {"navn": "Pawel", "poeng": [0, 3, 6, 12, 18, 18], "total": 18, "bilde": null, "initial": "P", "farge": "#63e3b3"}, {"navn": "Henrik", "poeng": [0, 5, 8, 11, 17, 17], "total": 17, "bilde": null, "initial": "H", "farge": "#d963e3"}, {"navn": "Kjetil", "poeng": [0, 6, 11, 14, 17, 17], "total": 17, "bilde": null, "initial": "K", "farge": "#c8e363"}, {"navn": "Marius BA", "poeng": [0, 3, 6, 14, 17, 17], "total": 17, "bilde": null, "initial": "MB", "farge": "#63a3e3"}, {"navn": "Ole Kristian", "poeng": [0, 5, 8, 11, 17, 17], "total": 17, "bilde": null, "initial": "OK", "farge": "#e3637d"}, {"navn": "Magnus", "poeng": [0, 6, 6, 9, 15, 15], "total": 15, "bilde": null, "initial": "M", "farge": "#63e36e"}, {"navn": "Harald", "poeng": [0, 5, 5, 8, 14, 14], "total": 14, "bilde": null, "initial": "H", "farge": "#9363e3"}, {"navn": "Aasmund", "poeng": [0, 3, 6, 9, 12, 12], "total": 12, "bilde": null, "initial": "A", "farge": "#e3b963"}, {"navn": "Olav", "poeng": [0, 3, 6, 9, 12, 12], "total": 12, "bilde": null, "initial": "O", "farge": "#63e3de"}, {"navn": "Torbjørn", "poeng": [0, 3, 6, 9, 12, 12], "total": 12, "bilde": null, "initial": "T", "farge": "#e363c3"}], "dager": [0, 1, 2, 3, 4, 5], "datoer": ["Start", "12.6", "13.6", "14.6", "15.6", "16.6"], "maxpoeng": 27};
const svg = document.getElementById('chart');
const NS = 'http://www.w3.org/2000/svg';
const tip = document.getElementById('tooltip');
const legend = document.getElementById('legend');
const hidden = new Set();   // skjulte deltakere (klikk i legend)
let active = new Set();     // uthevede deltakere (idx)
let lastKey = null;         // siste hover-mål, for å unngå unødig re-tegning

const el = (n, a) => { const e = document.createElementNS(NS, n);
  for (const k in a) e.setAttribute(k, a[k]); return e; };

function niceMax(v) { const step = v > 60 ? 20 : v > 30 ? 10 : 5;
  return Math.max(step, Math.ceil(v / step) * step); }

function layout() {
  const W = svg.clientWidth || 900;
  // høyere enn bred -> mer luft på y-aksen så bildene ikke ligger oppå hverandre
  const H = Math.max(440, Math.min(900, W * 0.62));
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('height', H);
  return { W, H };
}

function draw() {
  const { W, H } = layout();
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  const mL = 52, mR = 110, mT = 18, mB = 44;
  const x0 = mL, x1 = W - mR, y0 = H - mB, y1 = mT;
  const ndag = D.dager.length;            // antall punkter (inkl. Start)
  const lastX = D.dager[ndag - 1];
  const ymax = niceMax(D.maxpoeng || 5);

  const X = d => x0 + (x1 - x0) * (d / Math.max(1, lastX));
  const Y = p => y0 + (y1 - y0) * (p / ymax);

  // markørstørrelse ~ avstanden mellom to nabopoeng, så nabo-score akkurat tangerer
  // hverandre i stedet for å stable seg oppå hverandre
  const plotH = y0 - y1;
  const pxPP = plotH / Math.max(1, ymax);           // piksler per poeng
  const MK = Math.max(22, Math.min(46, Math.min(W * 0.04, pxPP * 1.05)));
  const half = MK / 2, ex = X(lastX);
  const step = Math.round(MK * 0.62);               // hvor mye hvert portrett viftes ut

  // --- rutenett + akser ---
  const yStep = ymax > 60 ? 20 : ymax > 30 ? 10 : 5;
  for (let p = 0; p <= ymax; p += yStep) {
    svg.appendChild(el('line', { class: 'grid-line', x1: x0, x2: x1, y1: Y(p), y2: Y(p) }));
    const t = el('text', { class: 'tick-label', x: x0 - 10, y: Y(p) + 4,
      'text-anchor': 'end', 'font-size': 13 });
    t.textContent = p; svg.appendChild(t);
  }
  for (let i = 0; i < ndag; i++) {
    const dx = X(D.dager[i]);
    svg.appendChild(el('line', { class: 'grid-line', x1: dx, x2: dx, y1: y0, y2: y1,
      opacity: 0.5 }));
    const t = el('text', { class: 'tick-label', x: dx, y: y0 + 20,
      'text-anchor': 'middle', 'font-size': 12.5 });
    t.textContent = D.datoer[i]; svg.appendChild(t);
  }
  svg.appendChild(el('line', { class: 'axis-line', x1: x0, x2: x1, y1: y0, y2: y0 }));
  svg.appendChild(el('line', { class: 'axis-line', x1: x0, x2: x0, y1: y0, y2: y1 }));

  const yt = el('text', { class: 'axis-title', x: x0 - 38, y: (y0 + y1) / 2,
    'text-anchor': 'middle', 'font-size': 13,
    transform: `rotate(-90 ${x0 - 38} ${(y0 + y1) / 2})` });
  yt.textContent = 'Poeng'; svg.appendChild(yt);
  const xt = el('text', { class: 'axis-title', x: (x0 + x1) / 2, y: H - 6,
    'text-anchor': 'middle', 'font-size': 13 });
  xt.textContent = 'Spilledag'; svg.appendChild(xt);

  // --- linjer (+ usynlig bred trefflinje så tynne linjer er lette å peke på) ---
  // siste punkt kappes ved venstrekanten av første kort, så linja stopper der
  // punktet er og ikke løper inn over bildene
  const lastJ = D.dager.length - 1;
  D.deltakere.forEach((s, i) => {
    if (hidden.has(i)) return;
    const pts = s.poeng.map((p, j) =>
      `${j === lastJ ? (ex - half - 1) : X(D.dager[j])},${Y(p)}`).join(' ');
    svg.appendChild(el('polyline', { class: 'serie', points: pts, stroke: s.farge,
      'data-line': i }));
    svg.appendChild(el('polyline', { points: pts, fill: 'none', stroke: 'transparent',
      'stroke-width': 12, 'data-line': i }));
    s.poeng.forEach((p, j) => {
      svg.appendChild(el('circle', { class: 'dot', cx: X(D.dager[j]), cy: Y(p),
        r: 2.6, fill: s.farge, 'data-dot': i }));
    });
  });

  // --- endemarkører: alltid på sitt EKTE punkt (ingen forskyvning) ---
  // Uavgjort (lik poengsum) faller på samme koordinat -> portrettene vifter
  // mot høyre som en kortstokk. Hvert bilde er sitt eget markørpunkt (hover
  // uthever den ene). Færre deler poeng utover i turneringen.
  const groups = new Map();                       // poengsum -> [idx, ...]
  D.deltakere.forEach((s, i) => {
    if (hidden.has(i)) return;
    const v = s.poeng[s.poeng.length - 1];
    if (!groups.has(v)) groups.set(v, []);
    groups.get(v).push(i);
  });

  // tegn lavest poeng først, så høyere havner øverst der markører overlapper
  [...groups.keys()].sort((a, b) => a - b).forEach(v => {
    const members = groups.get(v).slice()
      .sort((a, b) => D.deltakere[a].navn.localeCompare(D.deltakere[b].navn, 'no'));
    const yv = Y(v);

    members.forEach((i, k) => {
      const s = D.deltakere[i];
      const cx = ex + k * step, cy = yv, r = half;
      const g = el('g', { class: 'endmark', 'data-end': i });
      // mørk bakplate (litt større sirkel) gir tydelig kant mellom overlappende portretter
      g.appendChild(el('circle', { cx, cy, r: r + 1.5, fill: '#1a0309' }));
      if (s.bilde) {
        const cid = 'clip' + i;
        const cp = el('clipPath', { id: cid });
        cp.appendChild(el('circle', { cx, cy, r }));
        g.appendChild(cp);
        g.appendChild(el('image', { x: cx - r, y: cy - r, width: MK, height: MK,
          'clip-path': `url(#${cid})`, preserveAspectRatio: 'xMidYMid slice', href: s.bilde }));
      } else {
        g.appendChild(el('circle', { cx, cy, r, fill: s.farge }));
        const ini = el('text', { class: 'initial', x: cx, y: cy, 'font-size': MK * 0.46 });
        ini.textContent = s.initial; g.appendChild(ini);
      }
      g.appendChild(el('circle', { cx, cy, r, fill: 'none', stroke: s.farge, 'stroke-width': 2.5 }));
      svg.appendChild(g);
    });
  });

  applyActive();
}

function applyActive() {
  const on = active.size > 0;
  svg.querySelectorAll('[data-line],[data-dot]').forEach(n => {
    const i = +(n.dataset.line ?? n.dataset.dot);
    n.classList.toggle('dim', on && !active.has(i));
    if (n.dataset.line !== undefined) {
      n.classList.toggle('hot', active.has(i));
      if (active.has(i)) n.parentNode.appendChild(n);   // bring to front
    }
  });
  svg.querySelectorAll('[data-end]').forEach(n => {
    const i = +n.dataset.end;
    n.classList.toggle('dim', on && !active.has(i));
    if (active.has(i)) n.parentNode.appendChild(n);
  });
  legend.querySelectorAll('.leg').forEach(n => {
    n.style.background = active.has(+n.dataset.leg) ? 'rgba(0,0,0,0.4)' : '';
  });
}

function setActive(idxs) { active = new Set(idxs); applyActive(); }
function clearActive() { active = new Set(); applyActive(); }

function rankOf(s) { return D.deltakere.filter(o => o.total > s.total).length + 1; }

function showTip(i, evt) {
  const s = D.deltakere[i];
  tip.innerHTML = `<div class="tt-name">${s.navn}</div>` +
    `<div class="tt-meta"><b>${s.total} p</b> · plass ${rankOf(s)}</div>`;
  posTip(evt);
}
function posTip(evt) { tip.style.left = evt.clientX + 'px';
  tip.style.top = evt.clientY + 'px'; tip.style.opacity = 1; }
function hideTip() { tip.style.opacity = 0; }

// hendelser via delegering (overlever re-tegning)
svg.addEventListener('mousemove', e => {
  const t = e.target.closest('[data-line],[data-dot],[data-end]');
  if (!t) { if (active.size) { clearActive(); hideTip(); } lastKey = null; return; }
  const i = +(t.dataset.line ?? t.dataset.dot ?? t.dataset.end);
  if (i !== lastKey) { lastKey = i; setActive([i]); }
  showTip(i, e);
});
svg.addEventListener('mouseleave', () => { clearActive(); hideTip(); lastKey = null; });

// legend
D.deltakere.forEach((s, i) => {
  const rank = D.deltakere.filter(o => o.total > s.total).length + 1;
  const row = document.createElement('div');
  row.className = 'leg'; row.dataset.leg = i;
  row.innerHTML = `<span class="rank">${rank}.</span>` +
    `<span class="sw" style="background:${s.farge}"></span>` +
    `<span class="lname">${s.navn}</span><span class="lpts">${s.total}</span>`;
  row.addEventListener('mouseenter', e => { if (!hidden.has(i)) { setActive([i]); showTip(i, e); } });
  row.addEventListener('mousemove', e => { if (!hidden.has(i)) showTip(i, e); });
  row.addEventListener('mouseleave', () => { clearActive(); hideTip(); });
  row.addEventListener('click', () => {
    if (hidden.has(i)) hidden.delete(i); else hidden.add(i);
    row.classList.toggle('off', hidden.has(i));
    active = new Set(); lastKey = null; draw();
  });
  legend.appendChild(row);
});

draw();
let rt; window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(draw, 120); });

/* Auto-oppdatering: poll ETag/Last-Modified, reload kun ved ny deploy. */
(function () {
  let v0 = null;
  async function sjekk() {
    try {
      const r = await fetch(location.href, { method: 'HEAD', cache: 'no-store' });
      const v = r.headers.get('ETag') || r.headers.get('Last-Modified');
      if (v0 === null) { v0 = v; return; }
      if (v && v !== v0) location.reload();
    } catch (e) {}
  }
  sjekk();
  setInterval(sjekk, 5 * 60 * 1000);
  setTimeout(() => location.reload(), 24 * 60 * 60 * 1000);
})();
</script>
